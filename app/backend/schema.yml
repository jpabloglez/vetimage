components:
  schemas:
    CustomTokenObtainPairRequest:
      type: object
      description: Custom token serializer with additional user data
      properties:
        email:
          type: string
          writeOnly: true
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - email
      - password
    PatchedUserAuthRequest:
      type: object
      description: Serializer for authenticated user profile
      properties:
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
        role:
          $ref: '#/components/schemas/RoleEnum'
    RoleEnum:
      enum:
      - 1
      - 2
      - 3
      - 4
      - 5
      type: integer
      description: |-
        * `1` - User
        * `2` - Guest
        * `3` - Admin
        * `4` - Manager
        * `5` - Superuser
    UserAuth:
      type: object
      description: Serializer for authenticated user profile
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          maxLength: 254
        role:
          $ref: '#/components/schemas/RoleEnum'
      required:
      - email
      - id
    UserAuthRequest:
      type: object
      description: Serializer for authenticated user profile
      properties:
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
        role:
          $ref: '#/components/schemas/RoleEnum'
      required:
      - email
    UserRegistration:
      type: object
      description: Serializer for user registration
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          default: 1
      required:
      - email
    UserRegistrationRequest:
      type: object
      description: Serializer for user registration
      properties:
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
        password:
          type: string
          writeOnly: true
          minLength: 1
        password_confirm:
          type: string
          writeOnly: true
          minLength: 1
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          default: 1
      required:
      - email
      - password
      - password_confirm
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
