services:

  db-vetimage:
    image: postgres:17
    container_name: db-vetimage
    ports:
      - 5445:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./data/db:/var/lib/postgresql/data
    networks:
       - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-vetimage:
    image: redis:7-alpine
    container_name: redis-vetimage
    ports:
      - "6381:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-vetimage:
    build:
      context: .
      dockerfile: ./compose/Dockerfile.backend
    container_name: backend-vetimage
    image: backend-vetimage
    depends_on:
      - db-vetimage
      - redis-vetimage
    ports:
      - 3081:3080
    volumes:
      - ./app/backend:/var/www/app/backend
      - ./data/media:/var/www/app/backend/media
      - shared_volume:/var/www/static
    command: daphne -b 0.0.0.0 -p 3080 backend.asgi:application
    tty: true
    networks:
       - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3080/api/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - CELERY_BROKER_URL=redis://redis-vetimage:6379/0
      - CELERY_RESULT_BACKEND=redis://redis-vetimage:6379/0
      - REDIS_HOST=redis-vetimage
      - REDIS_PORT=6379
      - ORCHESTRATOR_HOST=orchestrator-vetimage
      - ORCHESTRATOR_PORT=50050
      - USE_ORCHESTRATOR=True

  celery-worker-vetimage:
    build:
      context: .
      dockerfile: ./compose/Dockerfile.backend
    container_name: celery-worker-vetimage
    depends_on:
      - db-vetimage
      - redis-vetimage
      - backend-vetimage
    volumes:
      - ./app/backend:/var/www/app/backend
      - ./data/media:/var/www/app/backend/media
    command: celery -A backend worker --loglevel=info --queues=ai_jobs,monitoring,default
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A backend inspect ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - CELERY_BROKER_URL=redis://redis-vetimage:6379/0
      - CELERY_RESULT_BACKEND=redis://redis-vetimage:6379/0

  celery-beat-vetimage:
    build:
      context: .
      dockerfile: ./compose/Dockerfile.backend
    container_name: celery-beat-vetimage
    depends_on:
      - db-vetimage
      - redis-vetimage
    volumes:
      - ./app/backend:/var/www/app/backend
    command: celery -A backend beat --loglevel=info
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat'"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - CELERY_BROKER_URL=redis://redis-vetimage:6379/0

  frontend-vetimage:
    build:
      context: .
      dockerfile: ./compose/Dockerfile.frontend
    container_name: frontend-vetimage
    image: frontend-vetimage
    ports:
      - 3001:3000
    volumes:
      - ./app/frontend/:/var/www/app/frontend
      - shared_volume:/var/www/static
    command: npm run dev
    tty: true
    networks:
       - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  dicom-gateway-vetimage:
    build:
      context: ./app/dicom-gateway
      dockerfile: Dockerfile
    container_name: dicom-gateway-vetimage
    depends_on:
      - db-vetimage
      - redis-vetimage
      - backend-vetimage
    ports:
      - "11113:11112"  # DICOM SCP
      - "8091:8001"    # Gateway API
    volumes:
      - ./app/dicom-gateway:/app
      - dicom_temp_volume:/app/storage/dicom-temp
    environment:
      - DICOM_AE_TITLE=VETIMAGE
      - DICOM_PORT=11112
      - DICOM_HOST=0.0.0.0
      - BACKEND_API_URL=http://backend-vetimage:3080
      - DATABASE_URL=postgresql://postgres:postgres@db-vetimage:5432/postgres
      - REDIS_URL=redis://redis-vetimage:6379/0
      - CELERY_BROKER_URL=redis://redis-vetimage:6379/0
      - CELERY_RESULT_BACKEND=redis://redis-vetimage:6379/0
      - STORAGE_PATH=/app/storage/dicom-temp
      - AUTO_FORWARD_TO_BACKEND=true
      - LOG_LEVEL=INFO
      - ENVIRONMENT=development
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  gateway-celery-worker-vetimage:
    build:
      context: ./app/dicom-gateway
      dockerfile: Dockerfile
    container_name: gateway-celery-worker-vetimage
    depends_on:
      - redis-vetimage
      - dicom-gateway-vetimage
    volumes:
      - ./app/dicom-gateway:/app
      - dicom_temp_volume:/app/storage/dicom-temp
    command: celery -A gateway.tasks worker --loglevel=info --queues=dicom_processing
    environment:
      - REDIS_URL=redis://redis-vetimage:6379/0
      - CELERY_BROKER_URL=redis://redis-vetimage:6379/0
      - CELERY_RESULT_BACKEND=redis://redis-vetimage:6379/0
      - BACKEND_API_URL=http://backend-vetimage:3080
      - DATABASE_URL=postgresql://postgres:postgres@db-vetimage:5432/postgres
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A gateway.tasks inspect ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  orthanc-test-pacs-vetimage:
    image: jodogne/orthanc-plugins:1.12.5
    container_name: orthanc-test-pacs-vetimage
    ports:
      - "4243:4242"   # DICOM protocol
      - "8043:8042"   # Web interface
    environment:
      - ORTHANC_NAME=Orthanc Test PACS
      - ORTHANC_AET=ORTHANC
      - ORTHANC_USERNAME=orthanc
      - ORTHANC_PASSWORD=orthanc
    volumes:
      - ./setup/orthanc.json:/etc/orthanc/orthanc.json:ro
      - ./data/orthanc:/var/lib/orthanc/db
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8042/system || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  orchestrator-redis-vetimage:
    image: redis:7-alpine
    container_name: orchestrator-redis-vetimage
    ports:
      - "6382:6379"  # Different port to avoid conflict with redis-vetimage
    volumes:
      - ./data/orchestrator-redis:/data
    command: redis-server --appendonly yes
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  orchestrator-vetimage:
    build:
      context: ./app/orchestrator
      dockerfile: ./Dockerfile.orchestrator
    container_name: orchestrator-vetimage
    depends_on:
      - orchestrator-redis-vetimage
    ports:
      - "50060:50050"  # gRPC port
      - "8084:8080"    # Prometheus metrics
    volumes:
      # Don't mount source in production - proto files are compiled during build
      # - ./app/orchestrator:/app
      - ./data/media:/var/www/app/backend/media  # Shared media for file access
    environment:
      - REDIS_HOST=orchestrator-redis-vetimage
      - REDIS_PORT=6379
      - GRPC_PORT=50050
      - METRICS_PORT=8080
      - NUM_WORKERS=2
      - MODELS_CONFIG=/app/orchestrator/config/models.yaml
    networks:
      - app-network
    restart: unless-stopped
    command: python -m orchestrator.main
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  shared_volume:
  dicom_temp_volume:

networks:
  app-network:
    name: vetimage_app-network
